name: CodexBarMobile
options:
  bundleIdPrefix: com.o1xhack.codexbar
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_UPCOMING_FEATURE_STRICT_CONCURRENCY: true

schemes:
  CodexBarMobile:
    build:
      targets:
        CodexBarMobile: all
    test:
      targets:
        - name: CodexBarMobileTests
        - name: CodexBarMobileUITests

targets:
  CodexBarSync:
    type: framework
    platform: iOS
    sources:
      - path: ../Shared
        group: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.o1xhack.codexbar.sync
        GENERATE_INFOPLIST_FILE: true
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "9"

  CodexBarMobile:
    type: application
    platform: iOS
    sources:
      - path: CodexBarMobile
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: CodexBarSync
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.o1xhack.codexbar.mobile
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "9"
        DEVELOPMENT_TEAM: 3TUERHN53E
        INFOPLIST_FILE: CodexBarMobile/Info.plist
        CODE_SIGN_ENTITLEMENTS: CodexBarMobile/CodexBarMobile.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: true

  CodexBarMobileTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CodexBarMobileTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: CodexBarMobile
      - target: CodexBarSync
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.o1xhack.codexbar.mobile.tests
        GENERATE_INFOPLIST_FILE: true

  CodexBarMobileUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CodexBarMobileUITests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: CodexBarMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.o1xhack.codexbar.mobile.uitests
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: CodexBarMobile
